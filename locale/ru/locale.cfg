[mod-setting-description]
pelagos-allow-fishing=Грузовые Корабля отключает ловлю рыбы манипуляторами, но это удобная механика на планете Пелагос. При желании вы можете отключить её и здесь.
pelagos-force-small-electric-generator=Принудительно включает Малый Электрогенератор Пелагоса для грузовых кораблей позволяет отключать электрогенератор на нефтяной платформе через настройки. Однако Пелагос требует наличия электрогенератора на нефтяной платформе в своем коде. Установка бортового генератора нефтяной платформы в значение "Нуля" и отключение этой настройки приведет к ошибке при попытке запуска игры.
pelagos-boat-inventory=Значение по умолчанию для размера инвентаря лодок было слишком высоким, поэтому оно было уменьшено до меньшего значения. (значение по умолчанию для грузовых судов - 80)
pelagos-cargoship-inventory=Значение по умолчанию для размера инвентаря на грузовых судах было слишком высоким, поэтому оно было уменьшено до меньшего значения. (значение по умолчанию для грузовых судов - 1000)
pelagos-tanker-capacity=Значение по умолчанию для вместимости танкера было слишком высоким, поэтому оно было уменьшено до меньшего значения. (значение по умолчанию для грузовых судов - 250000)
pelagos-fluid-value-based-flamethrower=Добавить все жидкости с топливной ценностью в список боеприпасов огнеметной турели и сбалансировать урон огнеметной турели в зависимости от топливной ценности

