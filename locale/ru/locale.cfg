[tips-and-tricks-item-description]
pelagos-briefing-main=[planet=pelagos] — это островной мир, богатый тропическими [entity=coconut-palm], [entity=methane], [entity=iron-ore], [entity=copper-ore] и мелкими формами жизни, включая [entity=fish]. Здесь собирают кокосы и перерабатывают их в масло, герметик и биотопливо, экспериментируют с ферментацией и используют высокотемпературную [entity=calciner] для очистки сырья.
pelagos-coconuts-and-oil=Сбор кокосов с [entity=coconut-palm]. Мякоть кокоса может быть переработана в [fluid=coconut-oil] или превращена в [item=coconut-sealant], который может использоваться в судостроении или в качестве топлива.
pelagos-calciners=[entity=calciner] позволяет проводить высокотемпературную очистку и преобразование сырья в рафинированные минералы. \nКальцинатор использует любую жидкость с «топливной ценностью», такую как [fluid=crude-oil], [fluid=methane], [fluid=coconut-oil] или [fluid=ethanol] (и другие). \nЧем выше топливная ценность жидкости, тем меньше требуется для сжигания и обработки материалов. Используйте его для кокосовой скорлупы, древесины, рыбы или других ресурсов, требующих интенсивной переработки.
canex-excavator=[entity=canex-excavator] — это специализированная машина, используемая для контролируемой выемки грунта. Для работы с ней сначала создайте [item=canex-digable] и разместите его на земле рядом с береговой линией. Затем поместите [entity=canex-excavator] сверху. Машина будет копать сквозь размещенную поверхность, оставляя после себя воду. Ее корпус герметичен, поэтому экскаватор может безопасно стоять на водных клетках до и после завершения выемки грунта. Вы можете использовать модули на экскаваторе. [item=speed-module] позволяет ускорить выемку грунта, а [item=productivity-module] позволит получить больше ресурсов.
wooden-platform=[item=wooden-platform] — это модульная поверхность, позволяющая размещать выбранные машины и инфраструктуру на воде. Используйте платформы для расширения вашей фабрики на озера, реки или океаны, при этом размещение должно ограничиваться легкими и устойчивыми конструкциями.\nПоддерживаемые объекты включают: \n- [entity=pipe]\n- [entity=barreling-machine]\n- [entity=radar]\n- манипуляторы\n- транспортные ленты\n- сундуки для хранения/логистики\n- машины для создания схем, такие как комбинатор, лампа и т. д.\n- [entity=gun-turret]\n- [entity=flamethrower-turret]\n- [entity=rocket-turret]

