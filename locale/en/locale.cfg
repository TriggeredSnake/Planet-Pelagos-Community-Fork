[tips-and-tricks-item-description]
pelagos-briefing-main=[planet=pelagos] is an insular world rich in tropical [entity=coconut-palm], [entity=methane], [entity=iron-ore], and minor lifeforms, including [entity=fish], and [entity=copper-biter-spawner] (which are source of copper here). Harvest coconuts and process them into oil, sealant, and biofuels, experiment with fermentation, and use high-temperature [entity=calciner] to refine raw materials.
pelagos-coconuts-and-oil=Harvest coconuts from [entity=coconut-palm]. Coconut meat can be processed into [fluid=coconut-oil] or turned into [item=coconut-sealant], which can be used for shipbuilding or as fuel. 
pelagos-calciners=[entity=calciner] allows high-temperature purification and transformation of raw materials into refined minerals. \nThe Calciner consumes any fluid with a "Fuel Value", such as [fluid=crude-oil], [fluid=methane], [fluid=coconut-oil], or [fluid=ethanol] (and more). \nThe higher the fuel value of the fluid, the less is needed to burn and process materials. Use it for coconut husks, wood, fish, or other resources that require intensive processing.
wooden-platform=[item=wooden-platform] is a modular surface that allows you to place selected machines and infrastructure on water. Use platforms to expand your factory into lakes, rivers, or oceans, while keeping placement restricted to lightweight, stable structures.\nSupported objects include: \n- [entity=pipe]\n- [entity=barreling-machine]\n- [entity=radar]\n- inserters\n- transport belts\n- logistic/storage chests\n- circuit network machines like combinator,lamp,etc.\n- [entity=gun-turret]\n- [entity=heavy-gun-turret]\n- [entity=flamethrower-turret]\n- [entity=rocket-turret]\n- [entity=pump] (not diesel one)
electromagnetic_waves=Every electric machine, and generator (including solar panels and accumulators) emits invisible electromagnetic waves.\nThese emissions represent radiation and interference produced by electricity usage.\nDifferent surfaces absorb them at different rates – water absorbs almost nothing, while sand slowly neutralizes them.\nSpawners and creatures on Pelagos can detect and react to these emissions: the more powerful your electric network, the more likely they are to be disturbed.\nKeep this in mind when building large power-hungry factories, or consider alternatives like diesel-powered machines if you want to stay safe.


