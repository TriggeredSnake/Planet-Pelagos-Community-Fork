[technology-description]
heavy-gun-turret=Reinforced titanium gun turret.\nFires three times faster than the standard model, with equal range and far greater resilience.Perfect for high-intensity defenses.
planet-discovery-pelagos=Discover the insular planet Pelagos and unlock its secrets.
coconut-processing-technology=Process coconuts into oil, sealant, and more advanced components.
fermentation-bacteria-cultivation-technology=Grow bacteria cultures to ferment resources into useful products.
pelagos-science-pack=Allows research into decomposition and degradation processes.
improvised-landfill=Create makeshift landfill structures from available materials.
landfill-productivity=Improve productivity of landfill-related recipes.
degradation-module-technology=Unlock module that reduces quality a lot and slightly boosts speed. 
wood-spoiling-technology=Allow decomposing wood and coconut husk into spoilage.
capsule-rockets=Use sealant to better secure gas capsules. This will allow launching them as rockets.
diesel-mining-drill=Extracts resources using mighty diesel power, independent of the electric grid. Reliable but fuel-hungry.
#diesel-inserter=Fuel-powered inserter with extended reach thanks to its diesel engine. Works off-grid, but consumes fuel.
diesel-automation=Enables fuel-powered machines that run on liquid fuels instead of electricity. Allows off-grid automation but requires constant fuel supply.
canex-excavator=Excavate water channels using power of liquid fuels
pelagos-casting-engine-unit=Cast engine units directly from molten iron and activated carbon, bypassing traditional machining. Provides a more efficient metallurgical route to produce engines.
titanium-barrels=Enables lightweight titanium barrels that stack twice as well as steel barrels, can be loaded in greater numbers onto rockets, and allow safe transport of even the most hard-to-store fluids.
titanium-technology=Enables titanium processing
diesel-agriculture=Farming powered by liquid fuel engines
pelagos-asteroid-bioprocessing=Allows biochamber to process asteroids
ethanol-thruster=Forged from lightweight titanium and fueled by pure ethanol, this thruster delivers clean, efficient thrust without the need for an oxidizer.
diesel-asteroid-collector=Asteroid collector powered by a liquid-fueled diesel engine. It operates independently of the electric grid. While slower than its electric counterpart, it features twice the collection range.
crane-stack-diesel-inserter=A specialized fuel-powered crane engineered for precise bulk transfer. Works like a stack inserter: \nIt gathers a full stack of items before swinging, enabling dense layered placement on belts. Its heavy-duty grab mechanism allows it to hold and move entire stacks at once, merging the lifting capacity of a crane with the accuracy of a stack inserter.
portable-diesel-generator=A reinforced portable diesel core designed for the harsh, salty winds of Pelagos. When fed barrels of fuel, it overwhelms even the Fission Reactor’s output.
coconut-drop-technology=You can drop coconuts on Cerys surface even before blasting hole in magnetosphere and ignore sandy atmosphere of Arig to drop coconuts there as well.
pelagos-biodiesel=Refine processed biomass into biodiesel, providing a sustainable alternative to traditional fuel sources.
improvised-concrete=Allows creating improvised concrete using locally available biomass and decomposed materials.
project-diesel-dragon=The pinnacle of diesel engineering: a liquid-fueled rocket-silo that ignores the power grid and brute-forces its way to orbit. Unlocks the Diesel Dragon.

