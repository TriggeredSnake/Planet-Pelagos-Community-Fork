[entity-description]
coconut-palm=A tropical tree that grows tasty coconuts.
diesel-mining-drill=Extracts resources using mighty diesel power, independent of the electric grid. Reliable but fuel-hungry.
diesel-inserter=Fuel-powered inserter with extended reach thanks to its diesel engine. Works off-grid, but consumes fuel.
diesel-assembling-machine=A versatile assembling machine powered by diesel engine. Works independently of the electric grid, but consumes a constant stream of fuel.
diesel-pump=A robust pump powered by liquid fuel. Transfers fluids without relying on electricity, ideal for off-grid fluid handling.
heavy-gun-turret=Reinforced titanium gun turret.\nFires three times faster than the standard model, with equal range and far greater resilience.Perfect for high-intensity defenses.
crane-bulk-diesel-inserter=A heavy-duty, fuel-powered crane designed for bulk cargo handling. It easily moves entire stacks in a single grab.\nPerfect for unloading ships or transferring items between large storage containers.
ethanol-thruster=Forged from lightweight titanium and fueled by pure ethanol, this thruster delivers clean, efficient thrust without the need for an oxidizer.
diesel-asteroid-collector=Asteroid collector powered by a liquid-fueled diesel engine. It operates independently of the electric grid. While slower than its electric counterpart, it features twice the collection range.
crane-stack-diesel-inserter=Fuel-powered belt stacking crane. Collects a full stack before transferring, allowing layered belt loading with crane-level throughput capacity.

